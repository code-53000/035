version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: sailing-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=sailing_club
      - TZ=Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - sailing-net

  sailing-api:
    build:
      context: .
      dockerfile: ./sailing-api/Dockerfile
    container_name: sailing-api
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sailing-net

  sailing-admin:
    build: ./sailing-admin
    container_name: sailing-admin
    ports:
      - "80:80"
    depends_on:
      - sailing-api
    restart: unless-stopped
    networks:
      - sailing-net

networks:
  sailing-net:
    driver: bridge

volumes:
  mysql-data:
